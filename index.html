<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VAN71</title>
    <link rel="stylesheet" href="./assets/van71-ui.css" />
    <style>
      .hero { margin-bottom: 1.2rem; }
      .hero p { margin: 0.55rem 0 0; max-width: 52ch; }
      .clients .card { text-decoration: none; display: block; }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__inner">
        <div class="brand">VAN71</div>
        <nav aria-label="Principal">
          <a data-scroll href="#clients">Clients</a>
          <a href="mailto:hello@van71.studio">Contact</a>
        </nav>
      </div>
    </header>

    <main>
      <div class="container">
        <section class="section hero" id="top">
          <p class="label">Hub</p>
          <h1>VAN71</h1>
          <p class="muted">Creative Strategy, Brand and Communication</p>
          <p><strong>Contact:</strong> <a href="mailto:hello@van71.studio">hello@van71.studio</a></p>
        </section>

        <section class="section clients" id="clients" data-section>
          <p class="label">Clients</p>
          <div class="grid">
            <a class="card" style="grid-column: span 6" href="./proposals/rosorta-abogados/">
              <p class="badge">Proposal</p>
              <h2 style="margin-top: 0.7rem">Rosorta Abogados</h2>
              <p class="muted">Open proposal document</p>
            </a>
          </div>
        </section>
      </div>
    </main>

    <script src="./assets/van71-ui.js" defer></script>
  </body>
</html>
