<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VAN71 · Hub</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f5f2;
        --text: #1b1a18;
        --muted: #6c685f;
        --line: #d9d2c8;
        --card-bg: #fff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--text);
        background: var(--bg);
      }

      main {
        width: min(960px, 92vw);
        margin: 4rem auto;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3.2rem);
        font-weight: 500;
        letter-spacing: 0.02em;
      }

      .intro {
        margin-top: 0.9rem;
        color: var(--muted);
        line-height: 1.65;
        max-width: 68ch;
      }

      .rule {
        border: 0;
        border-top: 1px solid var(--line);
        margin: 2.1rem 0;
      }

      #cards {
        display: grid;
        gap: 0.85rem;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      }

      .card {
        display: block;
        padding: 1rem 1.1rem;
        border: 1px solid var(--line);
        background: var(--card-bg);
        color: inherit;
        text-decoration: none;
        transition: border-color 0.2s ease, transform 0.2s ease;
      }

      .card:hover,
      .card:focus-visible {
        border-color: #8f8577;
        transform: translateY(-1px);
      }

      .card h2 {
        margin: 0;
        font-size: 1.08rem;
        font-weight: 550;
      }

      .card p {
        margin: 0.35rem 0 0;
        font-size: 0.92rem;
        color: var(--muted);
      }

      .status {
        color: var(--muted);
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>VAN71 · Hub</h1>
      <p class="intro">
        Índice editorial para acceder a la landing (cuando exista) y a todas las
        propuestas publicadas bajo <code>/proposals/*</code>.
      </p>
      <hr class="rule" />
      <section id="cards" aria-live="polite"></section>
      <p id="status" class="status">Buscando contenidos…</p>
    </main>

    <script>
      const cardsNode = document.getElementById("cards");
      const statusNode = document.getElementById("status");

      async function urlExists(path) {
        const normalized = path.startsWith("/") ? path : `/${path}`;

        try {
          const headResponse = await fetch(normalized, { method: "HEAD" });
          if (headResponse.ok) return true;
        } catch {}

        try {
          const getResponse = await fetch(normalized, { method: "GET" });
          return getResponse.ok;
        } catch {
          return false;
        }
      }

      function addCard({ title, href, description }) {
        const card = document.createElement("a");
        card.className = "card";
        card.href = href;

        const heading = document.createElement("h2");
        heading.textContent = title;

        const copy = document.createElement("p");
        copy.textContent = description || href;

        card.append(heading, copy);
        cardsNode.append(card);
      }

      function titleFromSlug(slug) {
        return slug
          .split("-")
          .filter(Boolean)
          .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
          .join(" ");
      }

      async function discoverLanding() {
        const landingCandidates = [
          "/landing/",
          "/landing/index.html",
          "/Landing/",
          "/Landing/index.html",
        ];

        for (const candidate of landingCandidates) {
          if (await urlExists(candidate)) {
            return {
              title: "Landing",
              href: candidate,
              description: "Página principal del proyecto.",
            };
          }
        }

        return null;
      }

      async function discoverProposals() {
        const found = new Map();

        // Opción recomendada: manifest JSON opcional en /proposals/index.json
        try {
          const manifestResponse = await fetch("/proposals/index.json");
          if (manifestResponse.ok) {
            const manifest = await manifestResponse.json();
            if (Array.isArray(manifest)) {
              for (const item of manifest) {
                if (!item || typeof item !== "object") continue;
                if (typeof item.href !== "string") continue;
                const href = item.href.startsWith("/") ? item.href : `/${item.href}`;
                found.set(href, {
                  title: item.title || "Propuesta",
                  href,
                  description: item.description || "Propuesta en /proposals.",
                });
              }
            }
          }
        } catch {}

        // Fallback: inspeccionar enlaces disponibles en /proposals/ o /proposals/index.html
        for (const source of ["/proposals/", "/proposals/index.html"]) {
          try {
            const response = await fetch(source);
            if (!response.ok) continue;

            const html = await response.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, "text/html");

            for (const link of doc.querySelectorAll("a[href]")) {
              const rawHref = link.getAttribute("href");
              if (!rawHref) continue;

              const absoluteHref = new URL(rawHref, source === "/proposals/" ? window.location.origin + "/proposals/" : window.location.origin).pathname;

              if (!absoluteHref.startsWith("/proposals/")) continue;
              if (absoluteHref === "/proposals/" || absoluteHref === "/proposals/index.html") continue;

              const proposalPath = absoluteHref.endsWith("/") ? absoluteHref : `${absoluteHref}/`;
              const slug = proposalPath.replace("/proposals/", "").replaceAll("/", "");
              if (!slug) continue;

              found.set(proposalPath, {
                title: titleFromSlug(slug),
                href: proposalPath,
                description: "Propuesta en /proposals.",
              });
            }
          } catch {}
        }

        return [...found.values()].sort((a, b) => a.title.localeCompare(b.title, "es"));
      }

      async function renderHub() {
        cardsNode.innerHTML = "";

        const [landing, proposals] = await Promise.all([
          discoverLanding(),
          discoverProposals(),
        ]);

        if (landing) addCard(landing);
        for (const proposal of proposals) addCard(proposal);

        const count = cardsNode.children.length;
        statusNode.textContent =
          count > 0
            ? `${count} enlace${count === 1 ? "" : "s"} disponible${count === 1 ? "" : "s"}.`
            : "Aún no hay landing ni propuestas detectables.";
      }

      renderHub();
    </script>
  </body>
</html>
